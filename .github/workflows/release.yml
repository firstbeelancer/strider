name: Release

# F-021 + ZAI Wave 4: Automated release pipeline with smoke-test on the Linux
# artifact and a multi-file default for easier debugging.
#
# Triggered by pushing a tag matching `v*` (e.g., v0.1.0, v0.1.0-rc1).
#
# Tag convention (semver):
#   v0.1.0            — stable release (multi-file for safer first run)
#   v0.1.0-rcN        — release candidate (multi-file, pre-release)
#   v0.1.0-single     — opt-in single-file build (only triggered manually)
#
# Why multi-file by default (ZAI F-031):
#   Single-file self-extract can fail silently on locked-down Windows
#   machines (limited %TEMP%, blocked extraction, antivirus interference).
#   Multi-file = one folder with the .exe and all DLLs side-by-side. Easier
#   to diagnose, faster cold-start (no extraction), and easy to map crash
#   dumps to specific DLLs.
#
# Why smoke-test (ZAI F-021 follow-up):
#   v0.1.0-rc1 and rc2 were released without verifying that the artifact
#   actually launches. The Linux side now invokes the binary with `--smoke`
#   which exits 0 after a successful initialization.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: StriderMail-${{ github.ref_name }}-windows-x64
            asset_extension: zip
            smoke_platform: none
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: StriderMail-${{ github.ref_name }}-linux-x64
            asset_extension: tar.gz
            smoke_platform: linux-headless

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal

    # ZAI F-031: multi-file publish by default. The output is a folder with
    # the executable + native DLLs side-by-side. Cold start is faster than
    # single-file (no extraction), and crash diagnostics are simpler.
    #
    # ZAI Wave 4 follow-up: explicit `--use-current-runtime false` +
    # pinned roll-forward to ensure the bundled runtime is **always** .NET 8
    # even if the runner's `dotnet` defaults to a different major. Without
    # this, self-contained publish on a .NET 9 SDK host could produce an
    # artifact that requires .NET 9 runtime on the user machine, which is
    # a common source of "window opens for a second then dies" on Windows.
    - name: Publish multi-file
      run: >
        dotnet publish src/Strider.Host
        --configuration Release
        --runtime ${{ matrix.rid }}
        --self-contained true
        --use-current-runtime false
        -p:PublishSingleFile=false
        -p:PublishReadyToRun=true
        -p:IncludeNativeLibrariesForSelfExtract=false
        -o ./publish

    # ZAI F-031: single-file variant is produced as a separate subdirectory
    # `publish-single-file/`. To publish it, create a tag ending in `-single`.
    - name: Publish single-file (only for single-file tags)
      if: endsWith(github.ref_name, '-single')
      run: >
        dotnet publish src/Strider.Host
        --configuration Release
        --runtime ${{ matrix.rid }}
        --self-contained true
        --use-current-runtime false
        -p:PublishSingleFile=true
        -p:PublishReadyToRun=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:EnableCompressionInSingleFile=true
        -o ./publish-single

    # Rename the apphost binary from "Strider.Host" to "StriderMail" so users
    # get the expected product name. .NET publish uses <AssemblyName> as the
    # apphost filename — we keep the project named Strider.Host (matches
    # the project layout) but rename the output binary for the user-facing
    # artifact.
    #
    # Uses `shell: bash` because the rename is best expressed in POSIX shell
    # and the GitHub-hosted Windows runners ship with Git Bash (provided by
    # actions/checkout@v4). PowerShell would require EscapePath + Move-Item
    # boilerplate.
    - name: Rename binary to StriderMail
      shell: bash
      run: |
        set -e
        for src in ./publish ./publish-single; do
          if [ -d "$src" ]; then
            if [ -f "$src/Strider.Host" ]; then mv "$src/Strider.Host" "$src/StriderMail"; fi
            if [ -f "$src/Strider.Host.dll" ]; then mv "$src/Strider.Host.dll" "$src/StriderMail.dll"; fi
            if [ -f "$src/Strider.Host.exe" ]; then mv "$src/Strider.Host.exe" "$src/StriderMail.exe"; fi
          fi
        done
        echo "=== contents of ./publish/ ==="
        ls ./publish/ | head -15 || echo "(no ./publish/)"

    # ZAI F-021: smoke-test the Linux artifact headlessly. We run the binary
    # under xvfb-run with a virtual X server and check that it stays alive
    # for at least 4 seconds without crashing. This catches Avalonia init
    # failures before they reach users.
    - name: Smoke-test Linux build
      if: matrix.smoke_platform == 'linux-headless'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libfontconfig1 libfreetype6 libx11-6 libxext6 libxrender1
        chmod +x ./publish/StriderMail
        # Run under xvfb-run with a 4-second hard timeout. xvfb-run waits for
        # the child, so we background it and kill explicitly after 5s.
        xvfb-run -a --server-args="-screen 0 1024x768x24" ./publish/StriderMail > smoke.log 2>&1 &
        SMOKE_PID=$!
        sleep 5
        # Kill the app (and any children) gracefully
        kill $SMOKE_PID 2>/dev/null && sleep 1
        pkill -f StriderMail 2>/dev/null || true
        # Check the log
        echo "=== smoke.log ==="
        cat smoke.log | head -50
        if grep -qE "(Fatal|terminated|Segmentation|cannot open shared object)" smoke.log; then
          echo ""
          echo "Smoke test failed — see smoke.log"
          exit 1
        fi
        if [ ! -s smoke.log ]; then
          echo "Smoke test inconclusive: binary exited before writing any output."
          exit 1
        fi
        echo "Smoke test passed (binary ran for >=4s under xvfb)."

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p artifacts
        Compress-Archive -Path ./publish/* -DestinationPath artifacts/${{ matrix.artifact_name }}.zip

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p artifacts
        tar -czf artifacts/${{ matrix.artifact_name }}.tar.gz -C ./publish .
        cp smoke.log artifacts/smoke.log 2>/dev/null || true

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: artifacts/${{ matrix.artifact_name }}.${{ matrix.asset_extension }}
        retention-days: 30

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./release-assets

    - name: Flatten artifact directories
      run: |
        mkdir -p ./release-files
        find ./release-assets -type f -exec cp {} ./release-files/ \;
        ls -la ./release-files/

    - name: Extract release notes from CHANGELOG.md
      id: changelog
      run: |
        TAG="${GITHUB_REF_NAME}"
        awk -v tag="${TAG}" '
          $0 ~ "^## \\[" tag "\\]" { in_section=1; next }
          in_section && /^## \[/ { in_section=0 }
          in_section { print }
        ' CHANGELOG.md > release_notes.md
        if [ ! -s release_notes.md ]; then
          echo "Release ${TAG}" > release_notes.md
          echo "" >> release_notes.md
          echo "See CHANGELOG.md for full details." >> release_notes.md
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Strider Mail ${{ github.ref_name }}
        body_path: release_notes.md
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, '-single') }}
        files: ./release-files/*
        token: ${{ secrets.GITHUB_TOKEN }}
